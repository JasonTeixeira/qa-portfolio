name: CI

# Fast feedback on every push: lint, content validation, build.
# Heavier checks (Playwright e2e, Lighthouse, production verification)
# live in dedicated workflows so a broken e2e run doesn't block code review.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate content (no dead refs)
        run: npm run validate

      - name: Build (debug)
        id: build
        env:
          # Build-time placeholders so Next.js doesn't fail on missing env in CI.
          # All real env values come from Vercel at runtime.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://www.sageideas.dev
        run: |
          set +e
          {
            echo '## Build debug'
            echo ''
            echo '```'
            node --version
            npm --version
            npx next --version
            echo ''
            echo '--- env (filtered) ---'
            env | grep -E '^(NEXT|CLERK|STRIPE|SUPABASE|RESEND)_' | sed -E 's/(KEY|SECRET)=.*/\1=***/' | sort
            echo ''
          } >> "$GITHUB_STEP_SUMMARY"
          npm run build > /tmp/build.log 2>&1
          status=$?
          {
            echo "--- build exit: $status ---"
            echo ''
            tail -300 /tmp/build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          if-no-files-found: ignore

      - name: Post build log as commit comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/build.log ]; then
            log=$(tail -150 /tmp/build.log)
            body=$(printf 'CI build failed for %s\n\n```\n%s\n```\n' "$GITHUB_SHA" "$log")
            jq -n --arg body "$body" '{body: $body}' > /tmp/comment.json
            gh api -X POST "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/comments" --input /tmp/comment.json || true
          fi
