name: Portfolio Verification

# Heavy verification (Playwright UI smoke, link check, Lighthouse).
# Runs on a nightly schedule and on-demand \u2014 not on every push, because
# these are expensive and flaky in CI without dedicated infra.

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Link + artifact integrity
        run: npm run test:links
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          RESEND_API_KEY: re_placeholder

      - name: UI smoke
        run: npm run test:ui
        continue-on-error: true

      - name: Lighthouse CI
        run: npm run test:lh
        continue-on-error: true
