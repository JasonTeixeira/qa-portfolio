    <text x="60" y="635" fill="#71717A" font-size="10" font-family="ui-monospace, monospace">14 days ago · 99.4%</text>
    <text x="1140" y="635" fill="#06B6D4" font-size="10" text-anchor="end" font-family="ui-monospace, monospace">today · 99.6%</text>
