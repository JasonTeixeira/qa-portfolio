<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace">
  <rect width="1200" height="675" fill="#09090B"/>
  <rect x="20" y="20" width="1160" height="635" rx="14" fill="#0F0F12" stroke="#27272A"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="1160" height="44" rx="14" fill="#0A0A0C" stroke="#27272A"/>
  <circle cx="48" cy="42" r="6" fill="#EF4444"/>
  <circle cx="68" cy="42" r="6" fill="#F59E0B"/>
  <circle cx="88" cy="42" r="6" fill="#10B981"/>
  <text x="600" y="46" fill="#A1A1AA" font-size="12" text-anchor="middle">terraform plan · landing-zone · prod account</text>

  <g font-size="12">
    <text x="60" y="100" fill="#71717A">$ terraform plan -out=tfplan</text>
    <text x="60" y="125" fill="#A1A1AA">Refreshing state… 47 resources</text>

    <text x="60" y="160" fill="#06B6D4">Terraform will perform the following actions:</text>

    <!-- Add VPC -->
    <text x="60" y="195" fill="#10B981">  + module.networking.aws_vpc.main</text>
    <text x="80" y="215" fill="#71717A">      cidr_block = "10.40.0.0/16"</text>
    <text x="80" y="232" fill="#71717A">      enable_dns_support = true</text>
    <text x="80" y="249" fill="#71717A">      tags = { Environment = "prod", ManagedBy = "terraform" }</text>

    <!-- Subnets -->
    <text x="60" y="280" fill="#10B981">  + module.networking.aws_subnet.private[0]</text>
    <text x="80" y="300" fill="#71717A">      cidr_block = "10.40.1.0/24"  availability_zone = "us-east-1a"</text>
    <text x="60" y="320" fill="#10B981">  + module.networking.aws_subnet.private[1]</text>
    <text x="80" y="340" fill="#71717A">      cidr_block = "10.40.2.0/24"  availability_zone = "us-east-1b"</text>

    <!-- Modify -->
    <text x="60" y="372" fill="#F59E0B">  ~ module.security.aws_iam_role.github_oidc</text>
    <text x="80" y="390" fill="#71717A">      assume_role_policy: + extra trusted repo "sage-ideas/qa-portfolio"</text>

    <text x="60" y="420" fill="#10B981">  + module.observability.aws_cloudwatch_dashboard.api</text>
    <text x="80" y="438" fill="#71717A">      dashboard_name = "qa-portfolio-prod-api"</text>

    <text x="60" y="468" fill="#10B981">  + module.observability.aws_cloudwatch_metric_alarm.error_rate</text>
    <text x="80" y="486" fill="#71717A">      threshold = 0.5  evaluation_periods = 2  pages on-call</text>
  </g>

  <!-- Plan summary -->
  <rect x="60" y="510" width="1080" height="120" rx="10" fill="#0A0A0C" stroke="#06B6D4" stroke-opacity="0.3"/>
  <text x="80" y="540" fill="#FAFAFA" font-size="13" font-weight="700">Plan: 5 to add, 1 to change, 0 to destroy</text>
  <text x="80" y="562" fill="#A1A1AA" font-size="11">tfsec · checkov gates passed · cost estimator: +$48/mo · ready for apply</text>

  <g font-size="11">
    <rect x="80" y="580" width="200" height="32" rx="6" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.3"/>
    <text x="180" y="601" fill="#10B981" text-anchor="middle" font-weight="600">SECURITY: 0 critical</text>

    <rect x="300" y="580" width="200" height="32" rx="6" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.3"/>
    <text x="400" y="601" fill="#10B981" text-anchor="middle" font-weight="600">POLICY: 412 passed</text>

    <rect x="520" y="580" width="200" height="32" rx="6" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-opacity="0.3"/>
    <text x="620" y="601" fill="#06B6D4" text-anchor="middle" font-weight="600">COST: +$48/month</text>

    <rect x="740" y="580" width="240" height="32" rx="6" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.3"/>
    <text x="860" y="601" fill="#10B981" text-anchor="middle" font-weight="600">ROLLBACK: tested · 28s</text>

    <rect x="1000" y="580" width="120" height="32" rx="6" fill="#06B6D4" stroke="#06B6D4"/>
    <text x="1060" y="601" fill="#09090B" text-anchor="middle" font-weight="700">APPLY ▸</text>
  </g>
</svg>
