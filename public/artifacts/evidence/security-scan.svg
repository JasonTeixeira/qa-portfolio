<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace">
  <rect width="1200" height="675" fill="#09090B"/>
  <rect x="20" y="20" width="1160" height="635" rx="14" fill="#0F0F12" stroke="#27272A"/>

  <!-- Terminal title bar -->
  <rect x="20" y="20" width="1160" height="44" rx="14" fill="#0A0A0C" stroke="#27272A"/>
  <circle cx="48" cy="42" r="6" fill="#EF4444"/>
  <circle cx="68" cy="42" r="6" fill="#F59E0B"/>
  <circle cx="88" cy="42" r="6" fill="#10B981"/>
  <text x="600" y="46" fill="#A1A1AA" font-size="12" text-anchor="middle">tfsec · checkov · trivy — security scan output</text>

  <!-- Terminal body -->
  <g font-size="12">
    <text x="60" y="105" fill="#71717A">$ make security-scan</text>

    <text x="60" y="135" fill="#06B6D4">▶</text>
    <text x="80" y="135" fill="#FAFAFA">tfsec ./infra</text>
    <text x="60" y="155" fill="#A1A1AA">  scanning 47 terraform files across 4 modules…</text>
    <text x="60" y="175" fill="#10B981">  ✓ no critical findings</text>
    <text x="60" y="195" fill="#10B981">  ✓ no high findings</text>
    <text x="60" y="215" fill="#F59E0B">  ⚠ 2 medium findings (waived with documented note)</text>

    <text x="60" y="245" fill="#06B6D4">▶</text>
    <text x="80" y="245" fill="#FAFAFA">checkov -d ./infra --framework terraform</text>
    <text x="60" y="265" fill="#A1A1AA">  passed checks: 412</text>
    <text x="60" y="285" fill="#A1A1AA">  failed checks: 0</text>
    <text x="60" y="305" fill="#A1A1AA">  skipped checks: 3 (with policy exception)</text>

    <text x="60" y="335" fill="#06B6D4">▶</text>
    <text x="80" y="335" fill="#FAFAFA">trivy fs --security-checks vuln,config,secret .</text>
    <text x="60" y="355" fill="#A1A1AA">  scanning dependencies…</text>
    <text x="60" y="375" fill="#10B981">  ✓ 0 CRITICAL  ✓ 0 HIGH  ✓ 0 MEDIUM</text>
    <text x="60" y="395" fill="#10B981">  ✓ no leaked secrets detected (gitleaks pattern set)</text>
  </g>

  <!-- Summary panel -->
  <rect x="60" y="430" width="1080" height="160" rx="10" fill="#0A0A0C" stroke="#10B981" stroke-opacity="0.3"/>
  <text x="80" y="460" fill="#10B981" font-size="13" font-weight="700">SCAN SUMMARY · GATE PASSED</text>

  <g font-size="11">
    <rect x="80" y="480" width="220" height="50" rx="6" fill="#09090B" stroke="#27272A"/>
    <text x="95" y="500" fill="#71717A">CRITICAL</text>
    <text x="95" y="520" fill="#10B981" font-size="22" font-weight="700">0</text>

    <rect x="320" y="480" width="220" height="50" rx="6" fill="#09090B" stroke="#27272A"/>
    <text x="335" y="500" fill="#71717A">HIGH</text>
    <text x="335" y="520" fill="#10B981" font-size="22" font-weight="700">0</text>

    <rect x="560" y="480" width="220" height="50" rx="6" fill="#09090B" stroke="#27272A"/>
    <text x="575" y="500" fill="#71717A">MEDIUM (WAIVED)</text>
    <text x="575" y="520" fill="#F59E0B" font-size="22" font-weight="700">2</text>

    <rect x="800" y="480" width="320" height="50" rx="6" fill="#09090B" stroke="#27272A"/>
    <text x="815" y="500" fill="#71717A">PASSED CHECKS</text>
    <text x="815" y="520" fill="#FAFAFA" font-size="22" font-weight="700">412</text>
  </g>

  <text x="80" y="560" fill="#A1A1AA" font-size="11">Build promoted: PR #4892 → main</text>
  <text x="80" y="580" fill="#71717A" font-size="11">Misconfigured S3 buckets, open SGs, weak IAM, leaked secrets — fail the build, not the production account.</text>
</svg>
