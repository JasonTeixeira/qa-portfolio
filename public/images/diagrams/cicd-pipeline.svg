<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <rect width="1200" height="400" fill="#09090B"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#FAFAFA" font-family="monospace" font-size="18" font-weight="bold">CI/CD REFERENCE PIPELINE</text>
  <text x="600" y="55" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="12">Every merge is gated. Every deploy is verified. Every metric is tracked.</text>

  <!-- Stage 1: Code Quality -->
  <rect x="20" y="85" width="155" height="80" rx="10" fill="#18181B" stroke="#06B6D4" stroke-width="2"/>
  <text x="97" y="110" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="11" font-weight="bold">Code Quality</text>
  <text x="97" y="128" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">ESLint · Prettier</text>
  <text x="97" y="143" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">TypeCheck · Format</text>
  <text x="97" y="158" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">~30 seconds</text>

  <path d="M175 125 L195 125" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Stage 2: Unit Tests -->
  <rect x="195" y="85" width="155" height="80" rx="10" fill="#18181B" stroke="#06B6D4" stroke-width="2"/>
  <text x="272" y="110" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="11" font-weight="bold">Unit Tests</text>
  <text x="272" y="128" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">pytest / Jest</text>
  <text x="272" y="143" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Fast feedback loop</text>
  <text x="272" y="158" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">~2 minutes</text>

  <path d="M350 125 L370 125" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Stage 3: Integration -->
  <rect x="370" y="85" width="155" height="80" rx="10" fill="#18181B" stroke="#8B5CF6" stroke-width="2"/>
  <text x="447" y="110" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="11" font-weight="bold">Integration</text>
  <text x="447" y="128" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">DB + Services</text>
  <text x="447" y="143" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">API contract tests</text>
  <text x="447" y="158" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">~3 minutes</text>

  <path d="M525 125 L545 125" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- Stage 4: E2E -->
  <rect x="545" y="85" width="155" height="80" rx="10" fill="#18181B" stroke="#8B5CF6" stroke-width="2"/>
  <text x="622" y="110" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="11" font-weight="bold">E2E + A11y</text>
  <text x="622" y="128" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Playwright · Axe</text>
  <text x="622" y="143" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Visual regression</text>
  <text x="622" y="158" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">~4 minutes (parallel)</text>

  <path d="M700 125 L720 125" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- Stage 5: Performance -->
  <rect x="720" y="85" width="155" height="80" rx="10" fill="#18181B" stroke="#F59E0B" stroke-width="2"/>
  <text x="797" y="110" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="11" font-weight="bold">Performance</text>
  <text x="797" y="128" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Lighthouse CI</text>
  <text x="797" y="143" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Bundle size check</text>
  <text x="797" y="158" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">P95 &lt; 500ms budget</text>

  <path d="M875 125 L895 125" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- Stage 6: Security -->
  <rect x="895" y="85" width="155" height="80" rx="10" fill="#18181B" stroke="#EF4444" stroke-width="2"/>
  <text x="972" y="110" text-anchor="middle" fill="#EF4444" font-family="monospace" font-size="11" font-weight="bold">Security</text>
  <text x="972" y="128" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Deps · Secrets · OWASP</text>
  <text x="972" y="143" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="9">Fail on critical</text>
  <text x="972" y="158" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">Checkov · Bandit</text>

  <!-- Down arrow to artifacts -->
  <line x1="600" y1="165" x2="600" y2="210" stroke="#3F3F46" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Stage 7: Artifacts & Deploy -->
  <rect x="195" y="210" width="330" height="70" rx="10" fill="#18181B" stroke="#10B981" stroke-width="2"/>
  <text x="360" y="238" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="12" font-weight="bold">Build &amp; Publish Artifacts</text>
  <text x="360" y="258" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="10">Docker image · Test reports · Coverage · Screenshots</text>
  <text x="360" y="273" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">Upload to S3 · GitHub Release</text>

  <path d="M525 245 L545 245" stroke="#10B981" stroke-width="1.5"/>

  <!-- Stage 8: Deploy -->
  <rect x="545" y="210" width="200" height="70" rx="10" fill="#18181B" stroke="#10B981" stroke-width="2"/>
  <text x="645" y="238" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="12" font-weight="bold">Deploy to Production</text>
  <text x="645" y="258" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="10">Vercel auto-deploy</text>
  <text x="645" y="273" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">GitHub OIDC → AWS (no static keys)</text>

  <path d="M745 245 L765 245" stroke="#10B981" stroke-width="1.5"/>

  <!-- Stage 9: Telemetry -->
  <rect x="765" y="210" width="200" height="70" rx="10" fill="#18181B" stroke="#10B981" stroke-width="2"/>
  <text x="865" y="238" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="12" font-weight="bold">Telemetry + Alerts</text>
  <text x="865" y="258" text-anchor="middle" fill="#A1A1AA" font-family="monospace" font-size="10">Quality dashboard update</text>
  <text x="865" y="273" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">SLO check · Triage playbooks</text>

  <!-- Bottom summary -->
  <rect x="100" y="320" width="1000" height="50" rx="10" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
  <text x="600" y="345" text-anchor="middle" fill="#FAFAFA" font-family="monospace" font-size="12">Total Pipeline: 8 minutes (was 45 min) · 82% reduction · Parallel execution · Docker layer caching</text>
  <text x="600" y="362" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="10">Every stage fails independently · Artifacts preserved on failure · Automatic rollback on health check failure</text>
</svg>