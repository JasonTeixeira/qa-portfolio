<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none">
  <rect width="1200" height="420" fill="#09090B"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#FAFAFA" font-family="monospace" font-size="18" font-weight="bold">TRADE ENGINE — Order State Machine</text>
  <text x="600" y="55" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="12">7 States · Enforced Transitions · Invalid transitions raise exceptions</text>

  <!-- CREATED -->
  <rect x="50" y="150" width="130" height="55" rx="10" fill="#18181B" stroke="#06B6D4" stroke-width="2"/>
  <text x="115" y="177" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="12" font-weight="bold">CREATED</text>
  <text x="115" y="195" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">Initial state</text>

  <!-- PENDING -->
  <rect x="240" y="150" width="130" height="55" rx="10" fill="#18181B" stroke="#06B6D4" stroke-width="2"/>
  <text x="305" y="177" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="12" font-weight="bold">PENDING</text>
  <text x="305" y="195" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">Risk validated</text>

  <!-- Arrow CREATED → PENDING -->
  <line x1="180" y1="177" x2="240" y2="177" stroke="#06B6D4" stroke-width="2"/>
  <polygon points="237,172 247,177 237,182" fill="#06B6D4"/>

  <!-- SUBMITTED -->
  <rect x="430" y="150" width="140" height="55" rx="10" fill="#18181B" stroke="#8B5CF6" stroke-width="2"/>
  <text x="500" y="177" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="12" font-weight="bold">SUBMITTED</text>
  <text x="500" y="195" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">At broker</text>

  <!-- Arrow PENDING → SUBMITTED -->
  <line x1="370" y1="177" x2="430" y2="177" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="427,172 437,177 427,182" fill="#8B5CF6"/>

  <!-- PARTIAL_FILL -->
  <rect x="630" y="150" width="160" height="55" rx="10" fill="#18181B" stroke="#F59E0B" stroke-width="2"/>
  <text x="710" y="177" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="12" font-weight="bold">PARTIAL_FILL</text>
  <text x="710" y="195" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">Partially executed</text>

  <!-- Arrow SUBMITTED → PARTIAL_FILL -->
  <line x1="570" y1="177" x2="630" y2="177" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="627,172 637,177 627,182" fill="#F59E0B"/>

  <!-- FILLED (terminal) -->
  <rect x="850" y="150" width="130" height="55" rx="10" fill="#10B981" stroke="#10B981" stroke-width="2"/>
  <text x="915" y="177" text-anchor="middle" fill="#09090B" font-family="monospace" font-size="12" font-weight="bold">FILLED</text>
  <text x="915" y="195" text-anchor="middle" fill="#09090B" font-family="monospace" font-size="9">Complete ✓</text>

  <!-- Arrow PARTIAL_FILL → FILLED -->
  <line x1="790" y1="177" x2="850" y2="177" stroke="#10B981" stroke-width="2"/>
  <polygon points="847,172 857,177 847,182" fill="#10B981"/>

  <!-- Arrow SUBMITTED → FILLED (direct) -->
  <path d="M500 205 Q500 240 915 240 Q915 240 915 205" stroke="#10B981" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>
  <text x="700" y="255" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">Full fill (no partial)</text>

  <!-- REJECTED (terminal) -->
  <rect x="240" y="300" width="130" height="55" rx="10" fill="#EF4444" stroke="#EF4444" stroke-width="2"/>
  <text x="305" y="327" text-anchor="middle" fill="#09090B" font-family="monospace" font-size="12" font-weight="bold">REJECTED</text>
  <text x="305" y="345" text-anchor="middle" fill="#09090B" font-family="monospace" font-size="9">Terminal ✗</text>

  <!-- Arrow CREATED → REJECTED -->
  <line x1="115" y1="205" x2="115" y2="327" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="115" y1="327" x2="240" y2="327" stroke="#EF4444" stroke-width="1.5"/>
  <polygon points="237,322 247,327 237,332" fill="#EF4444"/>

  <!-- Arrow PENDING → REJECTED -->
  <line x1="305" y1="205" x2="305" y2="300" stroke="#EF4444" stroke-width="1.5"/>
  <polygon points="300,297 305,307 310,297" fill="#EF4444"/>

  <!-- Arrow SUBMITTED → REJECTED -->
  <path d="M500 205 L500 270 L370 270 L370 327 L370 327" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,3" fill="none"/>

  <!-- CANCELLED (terminal) -->
  <rect x="560" y="300" width="140" height="55" rx="10" fill="#EF4444" stroke="#EF4444" stroke-width="2"/>
  <text x="630" y="327" text-anchor="middle" fill="#09090B" font-family="monospace" font-size="12" font-weight="bold">CANCELLED</text>
  <text x="630" y="345" text-anchor="middle" fill="#09090B" font-family="monospace" font-size="9">Terminal ✗</text>

  <!-- Arrow SUBMITTED → CANCELLED -->
  <line x1="530" y1="205" x2="530" y2="327" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="530" y1="327" x2="560" y2="327" stroke="#EF4444" stroke-width="1.5"/>

  <!-- Arrow PARTIAL_FILL → CANCELLED -->
  <line x1="710" y1="205" x2="710" y2="270" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="710" y1="270" x2="700" y2="300" stroke="#EF4444" stroke-width="1"/>

  <!-- Legend -->
  <rect x="900" y="290" width="260" height="85" rx="8" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
  <text x="1030" y="312" text-anchor="middle" fill="#FAFAFA" font-family="monospace" font-size="10" font-weight="bold">Legend</text>
  <rect x="920" y="322" width="10" height="10" rx="2" fill="#06B6D4"/>
  <text x="938" y="332" fill="#71717A" font-family="monospace" font-size="9">Active state</text>
  <rect x="1030" y="322" width="10" height="10" rx="2" fill="#10B981"/>
  <text x="1048" y="332" fill="#71717A" font-family="monospace" font-size="9">Success terminal</text>
  <rect x="920" y="342" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="938" y="352" fill="#71717A" font-family="monospace" font-size="9">Intermediate</text>
  <rect x="1030" y="342" width="10" height="10" rx="2" fill="#EF4444"/>
  <text x="1048" y="352" fill="#71717A" font-family="monospace" font-size="9">Failure terminal</text>
  <text x="1030" y="368" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="8">Invalid transitions raise InvalidTransition</text>
</svg>